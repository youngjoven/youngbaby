name: BabyDiary
options:
  bundleIdPrefix: com.youngbaby
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"

settings:
  SWIFT_VERSION: "6.0"

targets:
  BabyDiary:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BabyDiary
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.youngbaby.app
      PRODUCT_NAME: BabyDiary
      SWIFT_VERSION: "6.0"
      DEVELOPMENT_TEAM: CS2LWVP74A
      MARKETING_VERSION: "1.1"
      CURRENT_PROJECT_VERSION: "3"
      CODE_SIGN_STYLE: Manual
      CODE_SIGN_IDENTITY: "iPhone Distribution"
      PROVISIONING_PROFILE_SPECIFIER: "youngbaby"
    info:
      path: BabyDiary/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: PastelBackground
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSRemoteNotificationUsageDescription: "수유 알람 수신을 위해 알림 권한이 필요합니다."
        UIBackgroundModes:
          - remote-notification
